<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Confirmation paiement</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="page-header">
    <div>
        <p class="eyebrow">Portail CNDK</p>
        <h1>Confirmation du paiement</h1>
        <p class="subtitle">Vérifiez les informations avant de payer.</p>
    </div>
</div>

<div class="card">

    <p>
        <strong>Élève :</strong>
        {{ ligne.eleve.prenom }} {{ ligne.eleve.nom }}
    </p>

    <p>
        <strong>Activité :</strong>
        {{ ligne.activite.titre }}
    </p>

    <p>
        <strong>Montant :</strong>
        {{ ligne.montant_attendu }} €
    </p>

    <form action="{{ url_for('main.payer_en_ligne', activite_eleve_id=ligne.id) }}" method="POST">
        <button type="submit" class="btn-payer">
            Confirmer le paiement
        </button>
    </form>

    <br>

    <a href="{{ url_for('main.index') }}" class="btn-link">
        Annuler
    </a>

</div>

</body>
</html>
